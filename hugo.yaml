title: HradilSerhii_Blog
baseURL: https://hradilserhii.xyz/Blog/
languageCode: ru-ru
defaultContentLanguage: ru-ru
enableEmoji: true
ignoreErrors:
  - additional-script-loading-error
module:
  imports:
    - path: github.com/hugo-sid/hugo-blog-awesome
services:
  googleAnalytics:
    id: ""
  disqus:
    shortname: ""
markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false
Languages:
  en-gb:
    languageName: English
    languageCode: en-gb
    contentDir: content/en
    weight: 1
    menu:
      main:
        - pageRef: /
          name: Home
          url: /
          weight: 10
        - pageRef: posts
          name: Posts
          url: /posts/
          weight: 20
        - pageRef: about
          name: About
          url: /about/
          weight: 30
    params:
      sitename: Awesome hugo blog
      defaultColor: dark
      description: Minimal Hugo blog theme with light and dark mode support
      mainSections:
        - posts
      toc: true
      tocOpen: false
      goToTop: true
      additionalScripts:
        - js/custom.js
        - js/custom-2.js
      dateFormat: ""
      rssFeedDescription: summary
      author:
        avatar: avatar.png
        intro: Awesome hugo blog
        name: Sidharth R
        description:
          A fast, minimalistic Hugo theme with light and dark mode support,
          for running a personal site or blog.
      webmanifest:
        name: sitename
        short_name: sitename
        start_url: /
        theme_color: "#434648"
        background_color: "#fff"
        display: standalone
  ru-ru:
    languageName: Russian
    languageCode: ru-ru
    contentDir: content/ru
    weight: 1
    menu:
      main:
        - pageRef: /
          name: Главная
          url: /
          weight: 10
        - pageRef: posts
          name: Записи
          url: /posts/
          weight: 20
        - pageRef: about
          name: О проекте
          url: /about/
          weight: 30
    params:
      sitename: Превосходный hugo блог
      defaultColor: dark
      description:
        Минималистичная тема для блога на Hugo с поддержкой светлого и
        тёмного режима
      mainSections:
        - posts
      toc: true
      tocOpen: false
      goToTop: true
      additionalScripts:
        - js/custom.js
        - js/custom-2.js
      dateFormat: ""
      rssFeedDescription: summary
      author:
        avatar: avatar.png
        intro: Превосходный hugo блог
        name: Sidharth R
        description:
          Быстрая, минималистичная тема для Hugo с поддержкой светлого и
          тёмного режима для использования на персональных сайтах и блогах.
      webmanifest:
        name: sitename
        short_name: sitename
        start_url: /
        theme_color: "#434648"
        background_color: "#fff"
        display: standalone
params:
  browserconfig:
    TileColor: "#2d89ef"
  socialIcons:
    - name: github
      url: https://github.com/HradilSerhii
    - name: twitter
      url: https://twitter.com
    - name: Rss
      url: /index.xml
